<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - My Portfolio</title>
</head>

<body
  class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans antialiased transition-colors duration-300">
  <div id="app" class="max-w-5xl mx-auto px-6 py-8 md:px-8">
    <header class="sticky top-0 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md py-4 z-50 mb-16">
      <nav class="flex justify-between items-center">
        <ul class="flex flex-wrap gap-4 md:gap-6 list-none m-0 p-0">
          <li><a href="/" class="text-zinc-600 dark:text-zinc-400 hover:text-black dark:hover:text-white font-medium transition-colors">Home</a></li>
          <li><a href="/#about" class="text-zinc-600 dark:text-zinc-400 hover:text-black dark:hover:text-white font-medium transition-colors">About</a></li>
          <li><a href="/projects.html" class="text-zinc-600 dark:text-zinc-400 hover:text-black dark:hover:text-white font-medium transition-colors">Projects</a></li>
          <li><a href="/resume.html" class="text-zinc-600 dark:text-zinc-400 hover:text-black dark:hover:text-white font-medium transition-colors">Resume</a></li>
          <li><a href="/contact.html" class="text-zinc-600 dark:text-zinc-400 hover:text-black dark:hover:text-white font-medium transition-colors">Contact</a></li>
        </ul>
        <button id="theme-toggle" aria-label="Toggle theme"
          class="text-xl p-2 rounded-full hover:scale-110 transition-transform">🌓</button>
      </nav>
    </header>

    <main>
      <section id="contact" class="mb-24">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-6">Get in Touch</h1>
        <p class="text-lg text-zinc-600 dark:text-zinc-400 mb-8 max-w-2xl">Always open to discussing new projects, creative ideas or
          opportunities to be part of your visions.</p>

        <form class="flex flex-col gap-6 max-w-lg">
          <div>
            <label for="name" class="block text-sm font-medium mb-2 text-zinc-800 dark:text-zinc-200">Name</label>
            <input type="text" id="name" name="name" required
              class="w-full px-4 py-3 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-zinc-400 dark:focus:ring-zinc-600 transition-all">
          </div>
          <div>
            <label for="email" class="block text-sm font-medium mb-2 text-zinc-800 dark:text-zinc-200">Email</label>
            <input type="email" id="email" name="email" required
              class="w-full px-4 py-3 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-zinc-400 dark:focus:ring-zinc-600 transition-all">
          </div>
          <div>
            <label for="message" class="block text-sm font-medium mb-2 text-zinc-800 dark:text-zinc-200">Message</label>
            <textarea id="message" name="message" rows="5" required
              class="w-full px-4 py-3 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-zinc-400 dark:focus:ring-zinc-600 transition-all"></textarea>
          </div>
          <button type="submit"
            class="mt-2 px-6 py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 font-medium rounded-xl hover:bg-zinc-800 dark:hover:bg-white transition-colors">Send
            Message</button>
        </form>
      </section>
    </main>

    <footer class="mt-24 text-center text-sm text-zinc-500 pb-8">
      <p>&copy; 2026 Rohith. All rights reserved.</p>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
