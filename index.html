<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio of Rohith Senthilkumar, a software engineer building high-performance web and desktop applications with AI integration." />
    <title>Rohith Senthilkumar | Software Engineer</title>
    <script>
      // Prevent FOUC
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>
    <style>
      /* Critical first-paint colors to avoid white flash before app CSS loads */
      html, body, #root {
        min-height: 100%;
        margin: 0;
        background-color: #faf9f7;
        color: #1c1b1a;
        color-scheme: light dark;
      }

      html[data-theme='dark'], html[data-theme='dark'] body, html[data-theme='dark'] #root {
        background-color: #121110;
        color: #f0efeb;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
